<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kongko Spa | Premium Men's Spa & Grooming Retreat</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Experience premium men's spa therapies, deep tissue massage, and holistic grooming. Rediscover tranquility in our exclusive, masculine sanctuary at Kongko Spa.">
  <meta name="keywords" content="mens spa, grooming, massage, fire cupping, scalp detox, relaxation, sanctuary">
  <meta name="author" content="Kongko Spa">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CDNs (React, ReactDOM, Babel, Framer Motion) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>
    window.FramerMotion = window.FramerMotion || window.Motion;
    window.Motion = window.FramerMotion;
  </script>

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Instrument Serif"', 'serif'],
            body: ['Barlow', 'sans-serif'],
          },
          borderRadius: {
            DEFAULT: '9999px',
          },
          colors: {
            gold: {
              DEFAULT: '#d4af37',
              light: '#f3e5ab',
              dark: '#aa8c2c',
            },
          },
        },
      },
    }
  </script>

  <!-- Smoked-Gold Glass Utilities & Keyframes -->
  <style>
    /* Smoked-Gold Glass CSS Utilities */
    .smoked-glass {
      background: rgba(10, 10, 10, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(212, 175, 55, 0.15);
      position: relative;
      overflow: hidden;
    }
    .smoked-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, 
        rgba(212, 175, 55, 0.4) 0%, 
        rgba(212, 175, 55, 0.1) 20%, 
        rgba(212, 175, 55, 0) 40%, 
        rgba(212, 175, 55, 0) 60%, 
        rgba(212, 175, 55, 0.05) 80%, 
        rgba(212, 175, 55, 0.2) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .smoked-glass-strong { 
      background: rgba(212, 175, 55, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 4px 4px 12px rgba(0,0,0,0.5), inset 0 1px 1px rgba(212, 175, 55, 0.4);
      position: relative;
      overflow: hidden;
    }
    .smoked-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, 
        rgba(212, 175, 55, 0.6) 0%, 
        rgba(212, 175, 55, 0.3) 20%, 
        rgba(212, 175, 55, 0) 40%, 
        rgba(212, 175, 55, 0) 60%, 
        rgba(212, 175, 55, 0.2) 80%, 
        rgba(212, 175, 55, 0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Ken Burns Zoom Effect */
    @keyframes slowZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); }
    }
    .ken-burns {
      animation: slowZoom 25s linear infinite alternate;
    }

    /* General Body Styles */
    body {
      background-color: #0a0a0a;
      margin: 0;
      padding: 0;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Custom Premium Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(212, 175, 55, 0.25);
      border-radius: 9999px;
      border: 2px solid #0a0a0a;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 175, 55, 0.55);
    }
  </style>
</head>
<body>
  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- Load Babel JSX Components -->
  <script type="text/babel" src="components/AmbientImage.jsx"></script>
  <script type="text/babel" src="components/BlurText.jsx"></script>
  <script type="text/babel" src="components/Navbar.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Therapies.jsx"></script>
  <script type="text/babel" src="components/MenuSection.jsx"></script>
  <script type="text/babel" src="components/SocialSection.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>

  <!-- Render Main App -->
  <script type="text/babel">
    const renderApp = () => {
      if (
        window.App &&
        window.Navbar &&
        window.Hero &&
        window.Therapies &&
        window.MenuSection &&
        window.SocialSection &&
        window.AmbientImage &&
        window.BlurText
      ) {
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
      } else {
        setTimeout(renderApp, 50);
      }
    };
    renderApp();
  </script>
</body>
</html>
